<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Page</title>
  </head>
  <body>
    <h1>Sign Up Form</h1>
    <form id="signupForm" action="welcome.html">
      <label>
        First Name: <input type="text" id="fName" name="fName" /><br />
      </label>
      <label>
        Last Name: <input type="text" id="lName" name="lName" /><br />
      </label>

      Gender:
      <label><input type="radio" name="gender" value="m" />Male</label>
      <label><input type="radio" name="gender" value="f" />Female</label><br />

      <label>
        Zip Code: <input type="text" id="zip" name="zip" /> <br />
      </label>

      City: <span id="city"></span><br />
      Latitude: <span id="latitude"></span><br />
      Longitude: <span id="longitude"></span><br />

      <label
        >State:
        <select id="state" name="state">
          <option value="">Loading states...</option></select
        ><br />
      </label>

      <label
        >Select a County:
        <select id="county" name="county"></select
        ><br />
      </label>

      <label
        >Desired Username:
        <input type="text" id="username" name="username" />
      </label>
      <span id="usernameError"></span><br />

      <label
        >Password: <input type="password" id="password" name="password" /><br />
      </label>

      <label
        >Type Password Again:
        <input type="password" id="passwordAgain" name="passwordAgain" /><br />
      </label>
      <span id="passwordError"></span><br />

      <button>Sign up!</button>
    </form>
    <script src="js/script.js"></script>
  </body>
</html>
