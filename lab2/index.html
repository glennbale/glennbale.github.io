<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Guess a Number</title>
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <h1>Guess the Number!</h1>
      <h2>Guess a number between 1 and 99 in seven attempts!</h2>
    </header>
    <br />
    <div id="main">
      Enter a guess:
      <input type="text" id="playerGuess" size="5" />
      <button id="guessBtn">Guess</button> <br />
      <button id="resetBtn">Reset</button>
      <div id="feedback"></div>
      <div>Previous Guesses: <span id="guesses"></span></div>
      <div>Attempts left: <span id="attemptsLeft">7</span></div>
      <div>Wins: <span id="numberOfWins"></span></div>
      <div>Loses: <span id="numberOfLoses"></span></div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
