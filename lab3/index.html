<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Page</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow-lg p-4 mx-auto" style="max-width: 700px">
        <h1 class="text-center mb-4">Sign Up Form</h1>

        <form id="signupForm" action="welcome.html">
          <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" id="fName" name="fName" class="form-control" />
          </div>

          <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" id="lName" name="lName" class="form-control" />
          </div>

          <div class="mb-3">
            <label class="form-label d-block">Gender</label>

            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="radio"
                name="gender"
                value="m"
              />
              <label class="form-check-label">Male</label>
            </div>

            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="radio"
                name="gender"
                value="f"
              />
              <label class="form-check-label">Female</label>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Zip Code</label>
            <input type="text" id="zip" name="zip" class="form-control" />

            <small id="zipError" class="text-danger"></small>
          </div>

          <div class="mb-3">
            <strong>City:</strong>
            <span id="city"></span>
          </div>

          <div class="mb-3">
            <strong>Latitude:</strong>
            <span id="latitude"></span>
          </div>

          <div class="mb-3">
            <strong>Longitude:</strong>
            <span id="longitude"></span>
          </div>

          <div class="mb-3">
            <label class="form-label">State</label>

            <select id="state" name="state" class="form-select">
              <option value="">Loading states...</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Select a County</label>

            <select id="county" name="county" class="form-select">
              <option value="">Select a County</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Desired Username</label>

            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
            />

            <small id="usernameError"></small>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>

            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
            />

            <small id="passwordSuggestion" class="text-primary"></small>
          </div>

          <div class="mb-3">
            <label class="form-label">Retype Password</label>

            <input
              type="password"
              id="passwordAgain"
              name="passwordAgain"
              class="form-control"
            />

            <small id="passwordError" class="text-danger"></small>
          </div>

          <button class="btn btn-primary w-100">Sign Up!</button>
        </form>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
